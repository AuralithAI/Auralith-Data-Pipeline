# ──────────────────────────────────────────────────────────────────────
#  Auralith Data Pipeline — Automatic Version Tagging
#
#  ⚠️  Uses RELEASE_TOKEN (a PAT or GitHub App token) so the pushed
#      tag triggers release.yml. The default GITHUB_TOKEN does NOT
#      trigger downstream workflows — this is a GitHub limitation.
#
#  Setup:
#    1. Create a fine-grained PAT with "Contents: Read and write" scope
#    2. Add it as a repo secret named RELEASE_TOKEN
# ──────────────────────────────────────────────────────────────────────
name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  auto-tag:
    name: Create version tag
    runs-on: ubuntu-latest
    if: >-
      github.event.head_commit.author.username != 'github-actions[bot]'

    steps:
      # Use RELEASE_TOKEN so the tag push triggers release.yml.
      # Falls back to GITHUB_TOKEN if RELEASE_TOKEN is not set (tag won't
      # trigger release.yml in that case — you'd need to push manually).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: version
        run: |
          # Get the latest version tag (sorted by semver)
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            # No tags exist yet — start at v0.1.0
            NEXT="0.1.0"
            echo "🆕 No existing tags — starting at v${NEXT}"
          else
            echo "📦 Latest tag: ${LATEST}"
            # Strip leading 'v' and split
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            # Auto-increment patch
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "⬆️  Next version: v${NEXT}"
          fi

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Tag ${TAG} already exists — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "✅ Created and pushed tag ${TAG}"
          echo "🚀 The release pipeline will now run automatically."
